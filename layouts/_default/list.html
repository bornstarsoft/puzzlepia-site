{{ define "main" }}
<section class="page">
  <header class="page__header">
    <p class="eyebrow">{{ .Params.kicker | default .Title }}</p>
    <h1>{{ .Title }}</h1>
{{ with .Description }}<p>{{ . }}</p>{{ end }}
  </header>
  <div class="page__content">
{{ .Content }}
  </div>
{{ if .Pages }}
  <div class="game-grid">
{{ range .Pages.ByWeight }}
{{ partial "game-card.html" . }}
{{ end }}
  </div>
{{ end }}
</section>
{{ end }}
