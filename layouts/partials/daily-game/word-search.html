<section class="puzzle-card word-search-game" data-game="word-search" aria-labelledby="word-search-title">
  <div class="puzzle-card__header">
    <div>
      <p class="eyebrow">Playable starter</p>
      <h2 id="word-search-title">Find today's words</h2>
    </div>
    <p class="puzzle-status" data-status role="status" aria-live="polite">0 / 4 words found. Tap or drag across a word.</p>
  </div>
  <p class="puzzle-instructions">Drag across a word, tap its first and last letter, or use the word list as a reliable fallback.</p>
  <div class="word-search-layout">
    <div class="letter-grid" data-grid aria-label="6 by 6 word search grid"></div>
    <div class="target-list">
      <h3>Words</h3>
      <ul data-word-list>
        <li data-word="STAR"><button type="button" data-word-button="STAR">STAR</button></li>
        <li data-word="MOON"><button type="button" data-word-button="MOON">MOON</button></li>
        <li data-word="MINT"><button type="button" data-word-button="MINT">MINT</button></li>
        <li data-word="PLAY"><button type="button" data-word-button="PLAY">PLAY</button></li>
      </ul>
    </div>
  </div>
  <p class="puzzle-complete" data-complete hidden>Puzzle complete! Great job.</p>
  <button class="button button--primary puzzle-reset" type="button" data-reset>Reset puzzle</button>
  <a class="button button--secondary puzzle-cta" href="/games/kpop-word-search/">Explore KPOP Word Search</a>
</section>
