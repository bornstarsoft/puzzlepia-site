<section class="puzzle-card word-search-game" data-game="word-search" aria-labelledby="word-search-title">
  <div class="puzzle-card__header">
    <div>
      <p class="eyebrow">Playable starter</p>
      <h2 id="word-search-title">Find today's words</h2>
    </div>
    <p class="puzzle-status" data-status>Drag across the grid to begin.</p>
  </div>
  <div class="word-search-layout">
    <div class="letter-grid" data-grid aria-label="6 by 6 word search grid"></div>
    <div class="target-list">
      <h3>Words</h3>
      <ul data-word-list>
        <li data-word="STAR">STAR</li>
        <li data-word="MOON">MOON</li>
        <li data-word="MINT">MINT</li>
        <li data-word="PLAY">PLAY</li>
      </ul>
    </div>
  </div>
  <p class="puzzle-complete" data-complete hidden>Nice find. All words are complete.</p>
  <a class="button button--secondary puzzle-cta" href="/games/kpop-word-search/">Explore Kpop Word Search</a>
</section>
