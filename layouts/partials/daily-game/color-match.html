<section class="puzzle-card color-match-game" data-game="color-match" aria-labelledby="color-match-title">
  <div class="puzzle-card__header">
    <div>
      <p class="eyebrow">Playable starter</p>
      <h2 id="color-match-title">Clear color groups</h2>
    </div>
    <p class="puzzle-status" data-status>Target color: Pink.</p>
  </div>
  <p class="puzzle-instructions">Tap every tile of the target color. Clear all target colors to finish.</p>
  <div class="color-grid" data-grid aria-label="5 by 5 color matching grid"></div>
  <p class="puzzle-complete" data-complete hidden>Puzzle complete! Great job.</p>
  <button class="button button--primary puzzle-reset" type="button" data-reset>Reset puzzle</button>
  <a class="button button--secondary puzzle-cta" href="/games/color-rings-mania/">Explore Color Rings Mania</a>
</section>
