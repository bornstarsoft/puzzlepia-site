<section class="puzzle-card block-puzzle-game" data-game="block-puzzle" aria-labelledby="block-puzzle-title">
  <div class="puzzle-card__header">
    <div>
      <p class="eyebrow">Playable starter</p>
      <h2 id="block-puzzle-title">Place the pieces</h2>
    </div>
    <p class="puzzle-status" data-status>Select a piece, then tap the board.</p>
  </div>
  <p class="puzzle-instructions">Tap a piece, then tap the board where its top-left corner should go.</p>
  <div class="block-layout">
    <div class="block-board" data-board aria-label="6 by 6 block puzzle board"></div>
    <div class="piece-tray" data-tray aria-label="Block piece tray"></div>
  </div>
  <p class="puzzle-complete" data-complete hidden>Puzzle complete! Great job.</p>
  <button class="button button--primary puzzle-reset" type="button" data-reset>Reset puzzle</button>
  <a class="button button--secondary puzzle-cta" href="/games/blockzzle/">Explore Blockzzle</a>
</section>
