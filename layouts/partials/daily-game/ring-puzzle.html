<section class="puzzle-card ring-puzzle-game" data-game="ring-puzzle" aria-labelledby="ring-puzzle-title">
  <div class="puzzle-card__header">
    <div>
      <p class="eyebrow">Playable starter</p>
      <h2 id="ring-puzzle-title">Place colorful rings</h2>
    </div>
    <p class="puzzle-status" data-status>Select a ring, then tap a cell.</p>
  </div>
  <p class="puzzle-instructions">Tap a ring, then place it into a cell that does not already hold that size.</p>
  <div class="ring-layout">
    <div class="ring-board" data-board aria-label="3 by 3 ring puzzle board"></div>
    <div class="ring-tray" data-tray aria-label="Ring piece tray"></div>
  </div>
  <p class="puzzle-complete" data-complete hidden>Puzzle complete! Great job.</p>
  <button class="button button--primary puzzle-reset" type="button" data-reset>Reset puzzle</button>
  <a class="button button--secondary puzzle-cta" href="/games/ringzzle/">Explore Ringzzle</a>
</section>
