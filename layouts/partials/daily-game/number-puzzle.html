<section class="puzzle-card number-puzzle-game" data-game="number-puzzle" aria-labelledby="number-puzzle-title">
  <div class="puzzle-card__header">
    <div>
      <p class="eyebrow">Playable starter</p>
      <h2 id="number-puzzle-title">Tap 1 to 16</h2>
    </div>
    <p class="puzzle-status" data-status>Next number: 1</p>
  </div>
  <p class="puzzle-instructions">Tap the numbers in ascending order from 1 to 16.</p>
  <div class="number-grid" data-grid aria-label="4 by 4 number puzzle grid"></div>
  <p class="puzzle-complete" data-complete hidden>Puzzle complete! Great job.</p>
  <button class="button button--primary puzzle-reset" type="button" data-reset>Reset puzzle</button>
  <a class="button button--secondary puzzle-cta" href="/games/">Explore Puzzlepia Games</a>
</section>
