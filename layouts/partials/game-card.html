<article class="game-card">
  <div class="game-card__icon" aria-hidden="true">{{ .Params.icon | default "P" }}</div>
  <div>
{{ if or .Params.genre .Params.status }}
    <div class="game-card__meta">
{{ with .Params.genre }}<span>{{ . }}</span>{{ end }}
{{ with .Params.status }}<span>{{ . }}</span>{{ end }}
    </div>
{{ end }}
    <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
    <p>{{ .Description }}</p>
    <a class="button button--secondary game-card__button" href="{{ .RelPermalink }}">{{ if eq .Section "daily" }}Open puzzle{{ else }}View game{{ end }}</a>
  </div>
</article>
